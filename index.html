<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You - For Everything</title>
  <meta name="description" content="杉本さん・野村さんへ、感謝の気持ちを込めた送別動画ページです。" />
  <style>
    :root {
      --bg-start: #fffaf4;
      --bg-end: #f4eadf;
      --text-main: #4c382b;
      --text-sub: #8f6d52;
      --gold: #b58a55;
      --white: #ffffff;
      --shadow: rgba(76, 56, 43, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.9) 0, rgba(255,255,255,0) 28%),
        linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .petal {
      position: absolute;
      top: -10%;
      width: 16px;
      height: 10px;
      border-radius: 999px 999px 999px 0;
      background: rgba(236, 174, 178, 0.45);
      animation: fall linear infinite;
      opacity: 0.75;
    }

    .petal:nth-child(1) { left: 8%; animation-duration: 14s; animation-delay: 0s; }
    .petal:nth-child(2) { left: 22%; animation-duration: 18s; animation-delay: 3s; }
    .petal:nth-child(3) { left: 39%; animation-duration: 16s; animation-delay: 5s; }
    .petal:nth-child(4) { left: 55%; animation-duration: 20s; animation-delay: 1s; }
    .petal:nth-child(5) { left: 72%; animation-duration: 17s; animation-delay: 6s; }
    .petal:nth-child(6) { left: 88%; animation-duration: 19s; animation-delay: 2s; }

    @keyframes fall {
      0% {
        transform: translateY(-12vh) rotate(0deg);
      }
      50% {
        transform: translateY(52vh) translateX(34px) rotate(180deg);
      }
      100% {
        transform: translateY(112vh) translateX(-22px) rotate(360deg);
      }
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 56px 20px 44px;
      text-align: center;
    }

    .hero {
      padding: 34px 18px 18px;
      animation: fadeUp 1s ease both;
    }

    .eyebrow {
      margin: 0 0 6px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(42px, 8vw, 78px);
      line-height: 1.05;
      letter-spacing: 0.04em;
      color: var(--text-main);
      font-weight: 400;
    }

    .sub-eyebrow {
      margin: 0 0 30px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(17px, 3vw, 25px);
      line-height: 1.3;
      letter-spacing: 0.16em;
      color: var(--gold);
      font-weight: 400;
      text-transform: uppercase;
    }

    .names {
      margin: 0 0 16px;
      font-size: clamp(26px, 5.2vw, 44px);
      line-height: 1.45;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .lead {
      margin: 0 auto;
      max-width: 680px;
      font-size: clamp(16px, 2.8vw, 20px);
      line-height: 2;
      color: #5f4738;
    }

    .divider {
      width: 74px;
      height: 1px;
      margin: 34px auto 28px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .video-card {
      width: min(92%, 860px);
      margin: 22px auto 34px;
      padding: clamp(10px, 2vw, 16px);
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,248,240,0.78));
      box-shadow:
        0 18px 40px rgba(76, 56, 43, 0.14),
        0 2px 0 rgba(255,255,255,0.9) inset;
      backdrop-filter: blur(8px);
      animation: fadeUp 1s ease 0.2s both;
    }

    .video-frame {
      padding: 8px;
      border-radius: 24px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 10px 26px rgba(76, 56, 43, 0.08);
    }

    .video-wrap {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 18px;
      background: #efe4d8;
      padding-top: 56.25%;
    }

    .video-wrap iframe {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      border:0;
    }

    .ending {
      margin: 0 auto;
      max-width: 680px;
      padding: 10px 16px 0;
      animation: fadeUp 1s ease 0.35s both;
    }

    .ending p {
      margin: 0;
      font-size: clamp(16px, 2.8vw, 20px);
      line-height: 2;
      color: #5f4738;
      font-weight: 600;
    }

    .signature {
      display: block;
      margin-top: 24px;
      color: var(--text-sub);
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .flower {
      margin-top: 28px;
      font-size: 28px;
      opacity: 0.82;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {

      .video-card{
        padding:8px;
        margin:20px auto 28px;
      }

      .video-wrap{
        border-radius:12px;
        padding-top:70%;
      }

      .page {
        padding: 34px 14px 34px;
      }

      .hero {
        padding-top: 24px;
      }

      .sub-eyebrow {
        margin-bottom: 24px;
      }

      .names {
        letter-spacing: 0.02em;
      }

      .video-card {
        border-radius: 20px;
      }

      .video-wrap {
        border-radius: 14px;
      }
    }
      @media (max-width: 640px) {
      .page {
        padding: 26px 12px 30px;
      }

      .hero {
        padding: 16px 10px 8px;
      }

      .eyebrow {
        font-size: 42px;
        margin-bottom: 4px;
      }

      .sub-eyebrow {
        font-size: 15px;
        margin-bottom: 22px;
        letter-spacing: 0.14em;
      }

      .names {
        font-size: clamp(28px, 8.2vw, 34px);
        line-height: 1.42;
        letter-spacing: 0.02em;
        margin-bottom: 18px;
      }

      .lead {
        font-size: 17px;
        line-height: 1.9;
      }

      .divider {
        margin: 22px auto 22px;
      }

      .video-card {
        width: min(94%, 420px);
        padding: 7px;
        margin: 18px auto 30px;
        border-radius: 24px;
        box-shadow: 0 14px 30px rgba(76, 56, 43, 0.13);
      }

      .video-frame {
        padding: 6px;
        border-radius: 20px;
      }

      .video-wrap {
        border-radius: 16px;
        padding-top: 62%;
      }

      .ending {
        padding: 0 8px;
      }

      .ending p {
        font-size: 17px;
        line-height: 1.9;
      }
    }
  </style>
</head>
<body>
  <div class="petals" aria-hidden="true">
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
    <span class="petal"></span>
  </div>

  <main class="page">
    <section class="hero">
      <h1 class="eyebrow">Thank You</h1>
      <p class="sub-eyebrow">For Everything</p>

      <h2 class="names">
        杉本さん・野村さん<br>
        今まで本当に<br>
        ありがとうございました
      </h2>

      <p class="lead">
        みんなからの感謝の気持ちを<br>
        動画にしました。
      </p>
    </section>

    <div class="divider"></div>

    <section class="video-card" aria-label="送別動画">
      <div class="video-frame">
        <div class="video-wrap">
          <iframe
            src="https://drive.google.com/file/d/1lgvNQzj1Y9mCx3or8E8uK7EWvCgMM2XH/preview"
            allow="autoplay"
            allowfullscreen>
          </iframe>
        </div>
      </div>
    </section>

    <section class="ending">
      <p>
        お二人の新しい門出が<br>
        笑顔あふれる素敵な毎日となりますように。
        <span class="signature">ウィンキューブホールディングス一同</span>
      </p>
      <div class="flower">🌸</div>
    </section>
  </main>
</body>
</html>
